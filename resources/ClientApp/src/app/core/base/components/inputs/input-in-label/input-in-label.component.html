<label class="block overflow-hidden rounded-md border border-gray-200 px-3 py-2 shadow-sm focus-within:border-blue-600 focus-within:ring-1 focus-within:ring-blue-600" for="{{label}}">
  <span class="text-xs font-medium text-gray-700"> {{label}} </span>
  <textarea *ngIf="type == 'textarea' || type == null"  [formControl]="inputFormControl" class="mt-1 w-full h-auto border-none p-0 focus:border-transparent focus:outline-none focus:ring-0 sm:text-sm" id="{{label}}" placeholder="{{placeholder}}" type="textarea"></textarea>
  <input *ngIf="type !== 'textarea'" [formControl]="inputFormControl" [min]="0" class="mt-1 w-full h-auto {{class}} border-none p-0 focus:border-transparent focus:outline-none focus:ring-0 sm:text-sm" id="{{label}}" placeholder="{{placeholder}}" type="{{type}}">
</label>
