<div class="min-h-screen p-6 bg-gray-100 flex items-center justify-center">
  <div class="container max-w-screen-lg mx-auto">
    <div>
      <h2 class="font-semibold text-xl text-gray-600">แบบฟอร์มเพิ่มข้อมูลผู้ใช้</h2>
      <p class="text-gray-500 mb-6">กรุณาตรวจสอบข้อมูลก่อนทำการบันทึก</p>

      <div class="bg-white rounded shadow-lg p-4 px-4 md:p-8 mb-6">
        <div class="grid gap-4 gap-y-2 text-sm grid-cols-1 lg:grid-cols-3">
          <div class="text-gray-600">
            <p class="font-medium text-lg">รายละเอียดข้อมูลผู้ใช้</p>
            <p>กรุณากรอกข้อมูลให้ครบทุกช่อง</p>
          </div>

          <div class="lg:col-span-2">
            <form [formGroup]="form" class="grid gap-4 gap-y-2 text-sm grid-cols-1 md:grid-cols-5">
              <div class="md:col-span-full flex gap-4">
                <div class="w-full">
                  <label>ชื่อ</label>
                  <input type="text" formControlName="first_name" class="h-10 border mt-1 rounded px-4 w-full bg-gray-50" value=""/>
                </div>
                <div class="w-full">
                  <label>นามสกุล</label>
                  <input type="text" formControlName="last_name" class="h-10 border mt-1 rounded px-4 w-full bg-gray-50" value=""/>
                </div>
              </div>

              <div class="md:col-span-5">
                <label>อีเมล</label>
                <input type="text" formControlName="email" class="h-10 border mt-1 rounded px-4 w-full bg-gray-50" value="" placeholder=""/>
              </div>

              <div class="md:col-span-full flex gap-4">
                <div class="w-full">
                  <label>รหัสผ่าน</label>
                  <input type="text" formControlName="password" class="h-10 border mt-1 rounded px-4 w-full bg-gray-50" value="" placeholder=""/>
                </div>
                <div class="w-full">
                  <label>ยืนยันรหัสผ่าน</label>
                  <input type="text" formControlName="password_confirmation" class="h-10 border mt-1 rounded px-4 w-full bg-gray-50" value="" placeholder=""/>
                </div>
              </div>

              <div class="md:col-span-5">
                <label>เบอร์โทรศัพท์</label>
                <input type="text" formControlName="phone_number" class="cdk-text-field-autofill-monitored h-10 border mt-1 rounded px-4 w-full bg-gray-50" maxlength="10" value="" placeholder=""/>
              </div>

              <div class="md:col-span-5 flex">
                <div class="w-full">
                  <p>องค์กร</p>
                  <select formControlName="organization_id" class="border border-gray-300 rounded-full text-gray-600 w-44 h-10 pl-5 pr-10 bg-white hover:border-gray-400 focus:outline-none appearance-none">
                    <option>เลือกชื่อองค์กร</option>
                    <option *ngFor="let organization of organizations.name; index as i" [ngValue]="[parseInt(organizations.id[i]),organization]">{{ organization }}</option>
                  </select>
                </div>
                <div class="w-full">
                  <p>ตำแหน่ง</p>
                  <select formControlName="position_id" class="border border-gray-300 rounded-full w-44 text-gray-600 h-10 pl-5 pr-10 bg-white hover:border-gray-400 focus:outline-none appearance-none" >
                    <option>เลือกตำแหน่ง</option>
                    <option *ngFor="let position of positionsGroup[form.get('organization_id')?.value[1]]; index as i" [ngValue]="parseInt(positions.id[i])">{{position}}</option>
                  </select>
                </div>
<!--                <div class="w-full">-->
<!--                  <p>ตำแหน่ง</p>-->
<!--                  <select-->
<!--                    class="border border-gray-300 rounded-full w-44 text-gray-600 h-10 pl-5 pr-10 bg-white hover:border-gray-400 focus:outline-none appearance-none">-->
<!--                    <option>Choose a color</option>-->
<!--                    <option>Red</option>-->
<!--                    <option>Blue</option>-->
<!--                    <option>Yellow</option>-->
<!--                    <option>Black</option>-->
<!--                    <option>Orange</option>-->
<!--                    <option>Purple</option>-->
<!--                    <option>Gray</option>-->
<!--                    <option>White</option>-->
<!--                  </select>-->
<!--                </div>-->
              </div>

              <div class="md:col-span-5 text-right">
                <div class="inline-flex items-end">
                  <button [disabled]="!form.valid" (click)="submit()" [ngClass]="{'cursor-not-allowed': !form.valid}" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    บันทึก
                  </button>

                </div>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
